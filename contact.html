<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Kong Bui</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#8DA291",
                        "background-light": "#F9F7F2",
                        "background-dark": "#1A1A1A",
                        charcoal: "#2A2A2A",
                        "charcoal-light": "#4A4A4A",
                        "text-main": "#2A2A2A",
                        "text-muted": "#4A4A4A",
                        "text-light": "#2A2A2A",
                        "text-dark": "#e5e7eb",
                        "code-bg": "#2A2A2A"
                    },
                    fontFamily: {
                        display: ["Manrope", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    },
                    letterSpacing: {
                        superwide: '0.2em',
                    }
                },
            },
        };
    </script>
    <style>
        .code-syntax-keyword {
            color: #8DA291;
        }

        .code-syntax-string {
            color: #A3B18A;
        }

        .code-syntax-function {
            color: #E5E7EB;
        }

        .code-syntax-comment {
            color: #6B7280;
            font-style: italic;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-charcoal dark:text-gray-200 font-sans transition-colors duration-300 min-h-screen flex flex-col">
    <nav class="bg-white dark:bg-charcoal py-2 shadow-md drop-shadow-sm border-b border-gray-100 dark:border-gray-800 relative z-10 w-full">
        <div class="container mx-auto px-6 lg:px-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="small-icon.png" alt="Logo Icon" class="h-[5.5rem] w-auto object-contain">
                <div class="flex flex-col">
                    <span class="font-display text-2xl font-extrabold text-charcoal dark:text-white tracking-tighter">Bui Hong Kong</span>
                    <span class="text-[0.65rem] text-charcoal-light dark:text-gray-400 tracking-superwide uppercase mt-1 font-semibold">DevOps Engineer</span>
                </div>
            </a>
            <div class="hidden md:flex space-x-8 text-sm font-semibold tracking-superwide uppercase">
                <a class="text-charcoal dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors"
                    href="about.html">ABOUT</a>
                <a class="text-charcoal dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors"
                    href="portfolio.html">PORTFOLIO</a>
                <a class="text-charcoal dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors"
                    href="contact.html">CONTACT</a>
            </div>
            <button class="md:hidden text-charcoal dark:text-white">
                <span class="material-icons">menu</span>
            </button>
        </div>
    </nav>

    <main class="py-20 lg:py-32 flex-grow">
        <div class="container mx-auto px-6 lg:px-16 max-w-4xl">
            <h1
                class="font-display text-5xl lg:text-6xl font-extrabold tracking-tighter leading-[1.1] mb-6 text-charcoal dark:text-white text-center">
                Get in touch.
            </h1>
            <p class="text-lg text-charcoal-light dark:text-gray-300 mb-12 text-center max-w-2xl mx-auto font-medium">
                Interested in working together? Fill out the form below with some info about your project and I will get
                back to you as soon as I can.
            </p>

            <form action="https://api.web3forms.com/submit" method="POST"
                class="bg-white dark:bg-gray-800 p-8 lg:p-12 shadow-xl rounded-2xl border border-gray-200 dark:border-gray-700">
                
                <!-- Web3Forms Access Key -->
                <input type="hidden" name="access_key" value="a31d2e4c-0497-4816-803a-8500757f4b05">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div>
                        <label
                            class="block text-xs font-bold tracking-superwide uppercase text-charcoal-light dark:text-gray-400 mb-2"
                            for="name">Name</label>
                        <input
                            class="w-full bg-background-light dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-4 py-3 text-charcoal dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl"
                            id="name" name="name" type="text" placeholder="Jane Doe" required>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold tracking-superwide uppercase text-charcoal-light dark:text-gray-400 mb-2"
                            for="email">Email</label>
                        <input
                            class="w-full bg-background-light dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-4 py-3 text-charcoal dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl"
                            id="email" name="email" type="email" placeholder="jane@example.com" required>
                    </div>
                </div>
                <div class="mb-8">
                    <label
                        class="block text-xs font-bold tracking-superwide uppercase text-charcoal-light dark:text-gray-400 mb-2"
                        for="subject">Subject</label>
                    <input
                        class="w-full bg-background-light dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-4 py-3 text-charcoal dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl"
                        id="subject" name="subject" type="text" placeholder="Project Inquiry" required>
                </div>
                <div class="mb-10">
                    <label
                        class="block text-xs font-bold tracking-superwide uppercase text-charcoal-light dark:text-gray-400 mb-2"
                        for="message">Message</label>
                    <textarea
                        class="w-full bg-background-light dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-4 py-3 text-charcoal dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary rounded-xl h-40 resize-y"
                        id="message" name="message" placeholder="Tell me about your project..." required></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-opacity-90 text-white font-bold px-8 py-4 tracking-superwide uppercase text-xs transition-all shadow-sm hover:shadow-md rounded-full">
                    Send Message
                </button>
            </form>
        </div>
    </main>

</body>

</html>
